name: Destroy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string
      destroy_boilerplate:
        description: 'Destroy boilerplate stacks (database/lambda/appsync/step-functions/jira/web-app)'
        required: false
        type: boolean
        default: true
      destroy_balance_booking:
        description: 'Destroy Balance Booking stacks (auth/data/functions/api/web)'
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  validate:
    name: Validate Destruction Request
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "DESTROY" ]]; then
            echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
            exit 1
          fi
          echo "✅ Confirmation validated"

      - name: Validate target selection
        run: |
          if [ "${{ inputs.destroy_boilerplate }}" != "true" ] && [ "${{ inputs.destroy_balance_booking }}" != "true" ]; then
            echo "::error::Nothing selected to destroy — tick at least one of: destroy_boilerplate, destroy_balance_booking"
            exit 1
          fi

      - name: Warn about production
        if: github.event.inputs.stage == 'prod'
        run: |
          echo "⚠️ WARNING: You are about to destroy the PRODUCTION environment!"
          echo "This action is irreversible and will delete all production data."
          sleep 10

  destroy-balance-booking:
    name: Destroy Balance Booking in ${{ github.event.inputs.stage }}
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.destroy_balance_booking == true
    environment:
      name: ${{ github.event.inputs.stage }}-destroy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Destroy Balance Booking stacks
        env:
          STAGE: ${{ github.event.inputs.stage }}
        run: ./scripts/destroy-balance-booking.sh "$STAGE"

      - name: Balance Booking destroy summary
        run: |
          echo "## 🗑️ Balance Booking destroyed in ${{ github.event.inputs.stage }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Stacks removed (reverse-dependency order):" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-balance-booking-web\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-balance-booking-api\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-balance-booking-functions\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-balance-booking-data\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-balance-booking-auth\`" >> $GITHUB_STEP_SUMMARY

  destroy:
    name: Destroy boilerplate in ${{ github.event.inputs.stage }}
    runs-on: ubuntu-latest
    # Wait for balance-booking destroy if it ran (so cdk destroy --all isn't racing the dedicated
    # script). `always()` lets this run even if the BB destroy job was skipped.
    needs: [validate, destroy-balance-booking]
    if: always() && needs.validate.result == 'success' && inputs.destroy_boilerplate == true
    environment:
      name: ${{ github.event.inputs.stage }}-destroy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Destroy infrastructure
        env:
          STAGE: ${{ github.event.inputs.stage }}
        run: |
          echo "🗑️ Destroying ${{ github.event.inputs.stage }} environment..."
          cd packages/infrastructure
          STAGE=${{ github.event.inputs.stage }} npx cdk destroy --all --force

      - name: Cleanup orphaned resources
        env:
          STAGE: ${{ github.event.inputs.stage }}
        run: |
          echo "🧹 Cleaning up any orphaned resources..."
          ./scripts/cleanup-orphaned-resources.sh ${{ github.event.inputs.stage }}

      - name: Destruction summary
        run: |
          echo "## Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully destroyed **${{ github.event.inputs.stage }}** environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Destroyed CloudFormation Stacks" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-jira-dashboard\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-appsync\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-step-functions\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-lambda\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-database\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.event.inputs.stage }}-aws-boilerplate-web-app\` (if deployed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cleaned Up Resources" >> $GITHUB_STEP_SUMMARY
          echo "- 🗄️ DynamoDB Tables: \`main-table\`, \`jira-uploads\`, \`jira-issues\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 S3 Buckets: \`jira-dashboard-csvs\`, \`web-app\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Step Functions: \`jira-csv-processing\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 CloudWatch Log Groups: All Lambda, AppSync, Step Functions logs" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 CloudFront Distributions: Disabled (full deletion in 15-60 mins)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **All data has been permanently deleted.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💰 **No ongoing costs will be incurred from this environment.**" >> $GITHUB_STEP_SUMMARY
