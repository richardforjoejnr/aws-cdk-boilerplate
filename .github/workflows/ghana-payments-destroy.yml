name: Ghana Payments — Manual Destroy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Environment to destroy'
        required: true
        type: choice
        options: [dev, test, prod]
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed — must type DESTROY exactly."
            exit 1
          fi
      - name: Warn on prod-like
        if: inputs.stage != 'dev'
        run: |
          echo "⚠️  Destroying ${{ inputs.stage }} Ghana Payments in 10s — RETAIN resources will be orphaned. Abort if unintended."
          sleep 10

  destroy:
    name: Destroy ${{ inputs.stage }} ghana-payments
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ inputs.stage }}-ghana-payments-destroy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Destroy and clean up everything
        env:
          STAGE: ${{ inputs.stage }}
        # Script: detaches/deletes per-device IoT policies, destroys all stacks
        # (incl. spike if present), removes runtime SSM params, then VERIFIES nothing
        # remains — fails the job if anything is left. Writes its own step summary.
        run: |
          # CI is non-interactive; the script's prod-like prompt reads from stdin
          echo "${STAGE}" | ./scripts/destroy-ghana-payments.sh "$STAGE"
