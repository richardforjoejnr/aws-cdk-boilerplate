name: Balance Booking — Manual Destroy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Environment to destroy'
        required: true
        type: choice
        options: [dev, test, prod]
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed — must type DESTROY exactly."
            exit 1
          fi
      - name: Warn on prod
        if: inputs.stage == 'prod'
        run: |
          echo "⚠️  Destroying PRODUCTION balance-booking environment in 10s — abort the workflow if unintended."
          sleep 10

  destroy:
    name: Destroy ${{ inputs.stage }} balance-booking
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ inputs.stage }}-balance-booking-destroy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Destroy stacks
        env:
          STAGE: ${{ inputs.stage }}
        run: ./scripts/destroy-balance-booking.sh "$STAGE"

      - name: Summary
        run: |
          echo "## 🗑️ Balance Booking destroyed in ${{ inputs.stage }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Stacks removed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ inputs.stage }}-balance-booking-web\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ inputs.stage }}-balance-booking-api\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ inputs.stage }}-balance-booking-functions\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ inputs.stage }}-balance-booking-data\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ inputs.stage }}-balance-booking-auth\`" >> $GITHUB_STEP_SUMMARY
